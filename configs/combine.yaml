      seg: AC4_labels
      root: data/SNEMI3D

    - vol: minnie65_mip0_4096x4096x800_x70000_y90000_z17000_volume
      seg: minnie65_mip0_4096x4096x800_x70000_y90000_z17000_v1300_segmentation
